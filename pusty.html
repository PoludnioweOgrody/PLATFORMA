<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusty Szablon Maila - Mieszkańcy Południowych Ogrodów</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #1e5a44; /* Ciemna zieleń */
            --primary-light: #589a4b; /* Jasna zieleń */
            --accent-sun: #f4a236; /* Słoneczny pomarańczowy */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #e2e8f0;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text-main); 
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* --- LEWY PANEL: EDYTOR --- */
        #admin-panel {
            background: var(--card-bg); 
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column;
            height: calc(100vh - 40px);
            position: sticky;
            top: 20px;
            overflow-y: auto;
        }

        /* Nawigacja */
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            gap: 10px; 
        }
        
        .nav-btn { 
            text-decoration: none; 
            color: var(--primary-dark); 
            font-weight: 600; 
            border: 2px solid var(--primary-dark); 
            padding: 10px 15px; 
            border-radius: 10px; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            font-size: 13px; 
            background-color: transparent; 
            cursor: pointer; 
            flex: 1;
        }
        
        .nav-btn:hover { 
            background-color: var(--primary-dark); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(30, 90, 68, 0.2);
        }

        .nav-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 120px;
            height: auto;
        }

        /* Kontrolki formularza */
        .control-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--primary-light); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 10px; 
            font-family: 'Segoe UI', sans-serif; 
            font-size: 14px;
            box-sizing: border-box; 
            background-color: #f8fafc;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-light);
            background-color: #fff;
        }
        
        /* Edytor a'la Gmail */
        .editor-container { 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            flex-grow: 1; /* Pozwala edytorowi rozciągnąć się, gdy brakuje innych opcji */
            margin-bottom: 20px;
        }
        
        #editor {
            width: 100%; 
            min-height: 250px; 
            flex-grow: 1;
            padding: 15px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 14px; 
            line-height: 1.6; 
            overflow-y: auto; 
            color: var(--text-main);
            font-family: 'Segoe UI', 'Noto Color Emoji', sans-serif; 
        }
        
        .gmail-toolbar { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            padding: 10px; 
            background: #f8fafc; 
            border-top: 1px solid var(--border-color); 
            flex-wrap: wrap; 
        }
        
        .gmail-toolbar > button, .dropdown-toggle {
            background: none; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer;
            padding: 8px 12px; 
            font-family: "Times New Roman", Times, serif; 
            font-size: 16px;
            color: #4a5568; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        .gmail-toolbar > button:hover, .dropdown-toggle:hover { 
            background: #e2e8f0; 
            color: var(--primary-dark);
        }
        
        .gmail-toolbar .tool-bold { font-weight: bold; }
        .gmail-toolbar .tool-italic { font-style: italic; }
        .gmail-toolbar .tool-underline { text-decoration: underline; }

        /* Przycisk dodawania kontenera */
        .btn-add-container {
            font-family: 'Segoe UI', sans-serif !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            background-color: #edf2f7 !important;
            color: var(--primary-dark) !important;
            margin-left: auto; /* Przesuwa do prawej */
        }
        .btn-add-container:hover {
            background-color: var(--primary-light) !important;
            color: white !important;
        }

        /* Menu pop-up dla kolorów i emotikonów */
        .dropdown-container { position: relative; }
        .dropdown-menu {
            display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            margin-bottom: 10px; background: white; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px; z-index: 9999; padding: 15px; width: max-content;
        }
        
        .dropdown-menu::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border-width: 8px; border-style: solid; border-color: white transparent transparent transparent;
        }
        .dropdown-menu::before {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); margin-top: 1px;
            border-width: 9px; border-style: solid; border-color: var(--border-color) transparent transparent transparent; z-index: -1;
        }
        .dropdown-menu.active { display: block; }

        /* Siatka kolorów */
        .color-grid { display: grid; grid-template-columns: repeat(7, 28px); gap: 8px; margin-bottom: 12px; }
        .color-swatch { width: 28px; height: 28px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; transition: transform 0.1s; }
        .color-swatch:hover { transform: scale(1.15); border-color: #a0aec0; z-index: 2; position: relative; }
        .custom-color-wrapper { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #4a5568; border-top: 1px solid #e2e8f0; padding-top: 10px; }
        .custom-color-wrapper input[type="color"] { width: 28px; height: 28px; padding: 0; border: 1px solid #cbd5e0; border-radius: 4px; cursor: pointer; background: none; }

        /* Siatka emotikonów */
        .emoji-grid { 
            display: grid; grid-template-columns: repeat(7, 36px); gap: 6px; 
            max-height: 250px; overflow-y: auto; padding-right: 5px; 
            font-family: 'Noto Color Emoji', sans-serif; 
        }
        .emoji-item { 
            cursor: pointer; font-size: 22px; width: 36px; height: 36px; 
            display: flex; align-items: center; justify-content: center; border-radius: 6px; 
            transition: background 0.1s;
        }
        .emoji-item:hover { background: #edf2f7; }

        /* Przycisk kopiowania */
        .btn-copy {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            color: white; 
            border: none; 
            padding: 16px;
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: auto; 
            transition: all 0.3s; 
            font-size: 14px; 
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(30, 90, 68, 0.3);
        }
        .btn-copy:hover { 
            background: var(--accent-sun); 
            box-shadow: 0 6px 20px rgba(244, 162, 54, 0.4);
            transform: translateY(-2px);
        }
        .btn-copy.success { 
            background: #48bb78; 
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.3);
        }

        /* --- PRAWY PANEL: PODGLĄD --- */
        #email-preview { 
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        
        #copy-container {
            width: 100%;
            max-width: 650px;
        }

        /* Styl dla edytowalnej stopki po prawej stronie */
        #view-footer[contenteditable="true"]:focus {
            outline: 2px dashed #cbd5e0;
            outline-offset: 4px;
            border-radius: 4px;
            background-color: #fbfdfb;
        }

        /* Responsywność */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            #admin-panel {
                position: relative;
                height: auto;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="admin-panel">
        <div class="top-nav">
            <button onclick="history.back()" class="nav-btn">&laquo; Powrót</button>
            <a href="index.html" class="nav-btn" title="Menu Główne">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg> Menu Główne
            </a>
        </div>

        <div class="logo-container">
            <img src="logo.png" alt="Logo Stowarzyszenia">
        </div>

        <div class="control-group">
            <label>Nagłówek / Powitanie</label>
            <input type="text" id="input-name" value="Drodzy członkowie" oninput="updatePreview()">
        </div>

        <div class="control-group" style="display:flex; flex-direction:column; flex-grow:1;">
            <label>Treść wiadomości</label>
            <div class="editor-container">
                <div id="editor" contenteditable="true" oninput="updatePreview()">
                    Tu wprowadź treść...
                </div>
                
                <div class="gmail-toolbar">
                    <button class="tool-bold" onmousedown="event.preventDefault()" onclick="execCmd('bold')" title="Pogrubienie">B</button>
                    <button class="tool-italic" onmousedown="event.preventDefault()" onclick="execCmd('italic')" title="Kursywa">I</button>
                    <button class="tool-underline" onmousedown="event.preventDefault()" onclick="execCmd('underline')" title="Podkreślenie">U</button>
                    
                    <div class="dropdown-container">
                        <button class="dropdown-toggle" onmousedown="event.preventDefault()" onclick="toggleMenu('color-menu')" title="Kolor tekstu">
                            <span style="font-weight:bold; border-bottom: 3px solid #000; padding-bottom: 2px;">A</span> ▼
                        </button>
                        <div id="color-menu" class="dropdown-menu">
                            <div class="color-grid" id="color-grid">
                                </div>
                            <div class="custom-color-wrapper">
                                <span>Własny:</span>
                                <input type="color" id="custom-color-picker" onmousedown="saveSelection()" onchange="execCmd('foreColor', this.value); toggleMenu('color-menu');">
                            </div>
                        </div>
                    </div>

                    <div class="dropdown-container">
                        <button class="dropdown-toggle" onmousedown="event.preventDefault()" onclick="toggleMenu('emoji-menu')" title="Wstaw emotikon">
                            <span style="font-family: 'Noto Color Emoji', sans-serif;">😊</span>
                        </button>
                        <div id="emoji-menu" class="dropdown-menu">
                            <div class="emoji-grid" id="emoji-grid">
                                </div>
                        </div>
                    </div>

                    <button onmousedown="event.preventDefault()" onclick="execCmd('insertUnorderedList')" title="Lista punktowana">≡</button>
                    <button onmousedown="event.preventDefault()" onclick="execCmd('removeFormat')" title="Wyczyść formatowanie">T×</button>
                    
                    <button class="btn-add-container" onmousedown="event.preventDefault()" onclick="insertContainer()" title="Wstaw wyróżniony kontener">[+] Ramka</button>
                </div>
            </div>
        </div>

        <button class="btn-copy" id="copy-btn" onclick="copyEmail()">KOPIUJ TREŚĆ DO MAILA</button>
    </div>

    <div id="email-preview">
        <div id="copy-container">
            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif;">
                <tr>
                    <td align="center" style="padding: 30px 10px;">
                        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
                            <tr>
                                <td align="center" style="padding: 35px 0; background-color: #ffffff; border-bottom: 2px solid #f4f7f6;">
                                    <img src="logo.png" alt="Stowarzyszenie Mieszkańcy Południowych Ogrodów" width="150" style="display: block; border: 0;">
                                </td>
                            </tr>
                            <tr>
                                <td style="padding: 40px 45px;">
                                    <h1 id="view-name" style="font-size: 20px; color: #1e5a44; margin: 0 0 25px 0; font-weight: 700;">Drodzy członkowie,</h1>
                                    
                                    <div id="view-content" style="font-size: 15px; color: #333333; line-height: 1.7; font-family: 'Segoe UI', 'Noto Color Emoji', Arial, sans-serif;">
                                        </div>

                                    <div id="view-footer" contenteditable="true" style="margin-top: 30px; padding-top: 25px; border-top: 1px solid #e2e8f0; font-size: 14px; color: #333333; line-height: 1.5; font-family: 'Segoe UI', Arial, sans-serif;">
                                        <p style="margin: 0; color: #718096;">--</p>
                                        <p style="margin: 4px 0 0 0; color: #718096;">Z poważaniem</p>
                                        <p style="margin: 6px 0 0 0; font-weight: 600; color: #1a202c; font-size: 15px;">Zarząd Stowarzyszenia</p>
                                        <p style="margin: 2px 0 0 0; color: #1e5a44; font-weight: 600;">Mieszkańcy Południowych Ogrodów</p>
                                        <p style="margin: 4px 0 0 0;"><a href="mailto:mieszkancy.poludnioweogrody@gmail.com" style="color: #1e5a44; text-decoration: none;">mieszkancy.poludnioweogrody@gmail.com</a></p>
                                        <p style="margin: 2px 0 0 0; color: #718096; font-size: 13px;">REGON: 544172895</p>
                                    </div>

                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </div>
    </div>

</div>

<script>
    // --- MECHANIZM ZAZNACZANIA TEKSTU ---
    let savedSelection = null;
    const editorEl = document.getElementById('editor');

    function saveSelection() {
        const sel = window.getSelection();
        if (sel.getRangeAt && sel.rangeCount > 0) {
            savedSelection = sel.getRangeAt(0);
        }
    }

    function restoreSelection() {
        if (savedSelection) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(savedSelection);
        }
    }

    editorEl.addEventListener('mouseup', saveSelection);
    editorEl.addEventListener('keyup', saveSelection);
    editorEl.addEventListener('mouseleave', saveSelection);

    // --- GENEROWANIE KOLORÓW ---
    const colors = [
        '#1e5a44', '#589a4b', '#f4a236', '#000000', '#434343', '#666666', '#999999', 
        '#cccccc', '#efefef', '#cc0000', '#e69138', '#f1c232', '#6aa84f', '#45818e', 
        '#3d85c6', '#674ea7', '#ff0000', '#ff9900', '#ffff00', '#00ff00', '#00ffff', 
        '#0000ff', '#9900ff', '#f4cccc', '#fce5cd', '#fff2cc', '#d9ead3', '#d0e0e3'
    ];
    const colorGrid = document.getElementById('color-grid');
    colors.forEach(color => {
        const div = document.createElement('div');
        div.className = 'color-swatch';
        div.style.backgroundColor = color;
        div.onmousedown = (e) => e.preventDefault();
        div.onclick = () => {
            execCmd('foreColor', color);
            toggleMenu('color-menu'); 
        };
        colorGrid.appendChild(div);
    });

    // --- GENEROWANIE EMOTIKONÓW ---
    const emojis = [
        '😀','😁','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','😘','🥰','😗','😙','😚','☺️','🙂','🤗','🤩',
        '🤔','🤨','😐','😑','😶','🙄','😏','😣','😥','😮','🤐','😯','😪','😫','😴','😌','😛','😜','😝','🤤','😒','😓',
        '😔','😕','🙃','🤑','😲','☹️','🙁','😖','😞','😟','😤','😢','😭','😦','😧','😨','😩','🤯','😬','😰','😱','🥵',
        '🥶','😳','🤪','😵','😡','😠','🤬','😷','🤒','🤕','🤢','🤮','🤧','😇','🤠','🤡','🤥','🤫','🤭','🧐','🤓',
        '✅','❌','❎','➕','➖','➗','❓','❔','❕','❗','⭕',
        '💼','📈','📉','📊','📋','📅','📆','📇','📁','📂','📃','📄','🧮','📎','🔗','✂️','🗑️','📌','📍',
        '📞','☎️','📠','📧','✉️','📩','📨','📬','📮','🏠','🏢','🏦','💰','🪙','💴','💵','💶','💷','💸','💳','🧾',
        '🚀','🔥','⭐','💡','🔔','💯', '🏡', '🌳', '🌻', '🍃'
    ];
    const emojiGrid = document.getElementById('emoji-grid');
    emojis.forEach(emoji => {
        const span = document.createElement('span');
        span.className = 'emoji-item';
        span.innerText = emoji;
        span.onmousedown = (e) => e.preventDefault();
        span.onclick = () => {
            insertEmoji(emoji);
            toggleMenu('emoji-menu'); 
        };
        emojiGrid.appendChild(span);
    });

    // --- FUNKCJE EDYTORA ---
    function toggleMenu(menuId) {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            if (menu.id !== menuId) menu.classList.remove('active');
        });
        document.getElementById(menuId).classList.toggle('active');
    }

    document.addEventListener('mousedown', function(event) {
        if (!event.target.closest('.dropdown-container')) {
            document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('active'));
        }
    });

    function execCmd(command, value = null) {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        document.execCommand("styleWithCSS", false, true); 
        document.execCommand(command, false, value);
        saveSelection();
        updatePreview();
    }

    function insertEmoji(emoji) {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        document.execCommand('insertText', false, emoji);
        saveSelection();
        updatePreview();
    }

    // Wstawianie specjalnego kontenera w treści edytora
    function insertContainer() {
        if (document.activeElement !== editorEl) {
            editorEl.focus();
            restoreSelection();
        }
        
        // Kod HTML ramki
        const containerHtml = `
            <br>
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f8faf8; border-left: 4px solid #1e5a44; border-radius: 0 6px 6px 0; margin-bottom: 20px; margin-top: 10px;">
                <tr>
                    <td style="padding: 18px 20px;">
                        <p style="margin: 0;"><em>Wpisz treść wyróżnioną...</em></p>
                    </td>
                </tr>
            </table>
            <br>
        `;
        
        document.execCommand('insertHTML', false, containerHtml);
        saveSelection();
        updatePreview();
    }

    function updatePreview() {
        const name = document.getElementById('input-name').value;
        const content = editorEl.innerHTML;

        let formattedName = name.trim();
        if (formattedName && !formattedName.endsWith(',')) {
            formattedName += ',';
        }
        document.getElementById('view-name').textContent = formattedName;
        document.getElementById('view-content').innerHTML = content;
    }

    function copyEmail() {
        const container = document.getElementById('copy-container');
        const btn = document.getElementById('copy-btn');
        const footer = document.getElementById('view-footer');
        
        // Zabezpieczenie przez kopiowaniem atrybutu "contenteditable"
        if(footer) footer.removeAttribute('contenteditable');

        const range = document.createRange();
        range.selectNode(container);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);

        try {
            const blob = new Blob([container.innerHTML], { type: 'text/html' });
            const item = new ClipboardItem({ 'text/html': blob });
            navigator.clipboard.write([item]).then(() => {
                btn.textContent = '✅ SKOPIOWANO!';
                btn.classList.add('success');
                setTimeout(() => {
                    btn.textContent = 'KOPIUJ TREŚĆ DO MAILA';
                    btn.classList.remove('success');
                }, 2000);
            });
        } catch (err) {
            document.execCommand('copy');
            btn.textContent = '✅ SKOPIOWANO!';
            btn.classList.add('success');
            setTimeout(() => {
                btn.textContent = 'KOPIUJ TREŚĆ DO MAILA';
                btn.classList.remove('success');
            }, 2000);
        }
        
        window.getSelection().removeAllRanges();
        
        // Przywrócenie możliwości edycji po skopiowaniu
        if(footer) footer.setAttribute('contenteditable', 'true');
    }

    // Inicjalizacja podglądu
    updatePreview();
</script>

</body>
</html>
