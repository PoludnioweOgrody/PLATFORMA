<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Główne Menu - Mieszkańcy Południowych Ogrodów</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --primary-dark: #1e5a44; /* Ciemna zieleń */
            --primary-light: #589a4b; /* Jasna zieleń */
            --accent-sun: #f4a236; /* Słoneczny pomarańczowy */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px; /* Zmniejszona szerokość, bo jest mniej elementów */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        /* Sekcja nagłówka i logo */
        .header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            padding: 50px 20px;
            border-bottom: 5px solid var(--accent-sun);
        }

        .logo-container {
            background-color: #fff;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
        }

        .logo-container img {
            width: 140px; /* Trochę większe logo, skoro jest głównym punktem */
            height: auto;
            display: block;
        }

        .header h1 {
            color: #ffffff;
            font-size: 1.6rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        /* Sekcja przycisków nawigacyjnych */
        .nav-menu {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        /* Dla większych ekranów przyciski będą obok siebie */
        @media (min-width: 480px) {
            .nav-menu {
                grid-template-columns: 1fr 1fr;
            }
        }

        .menu-button {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--primary-dark);
            color: #ffffff;
            text-decoration: none;
            padding: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(30, 90, 68, 0.2);
        }

        .menu-button:hover {
            background-color: var(--accent-sun);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(244, 162, 54, 0.3);
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <header class="header">
            <div class="logo-container">
                <img src="logo.png" alt="Logo Stowarzyszenia">
            </div>
            <h1>Menu Główne</h1>
        </header>

        <nav class="nav-menu">
            <a href="pusty.html" class="menu-button">Pusty</a>
            <a href="szablony.html" class="menu-button">Szablony</a>
        </nav>
    </div>

</body>
</html>
