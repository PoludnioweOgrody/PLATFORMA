<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szablony - Mieszkańcy Południowych Ogrodów</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --primary-dark: #1e5a44; /* Ciemna zieleń */
            --primary-light: #589a4b; /* Jasna zieleń */
            --accent-sun: #f4a236; /* Słoneczny pomarańczowy */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        /* Górny pasek nawigacyjny (Powrót / Strona główna) */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: var(--card-bg);
            gap: 15px;
        }

        .nav-btn {
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: bold;
            border: 2px solid var(--primary-dark);
            padding: 10px 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            background-color: transparent;
            cursor: pointer;
            flex: 1;
        }

        .nav-btn:hover {
            background-color: var(--primary-dark);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(30, 90, 68, 0.2);
        }

        .nav-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Sekcja nagłówka i logo */
        .header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            padding: 40px 20px;
            border-bottom: 5px solid var(--accent-sun);
        }

        .logo-container {
            background-color: #fff;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
        }

        .logo-container img {
            width: 140px;
            height: auto;
            display: block;
        }

        .header h1 {
            color: #ffffff;
            font-size: 1.6rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        /* Sekcja przycisków szablonów */
        .nav-menu {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .menu-button {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--primary-dark);
            color: #ffffff;
            text-decoration: none;
            padding: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(30, 90, 68, 0.2);
        }

        .menu-button:hover {
            background-color: var(--accent-sun);
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(244, 162, 54, 0.3);
        }
        
        /* Dodatkowy tekst zachęcający / podpowiedź */
        .section-desc {
            color: #666;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

    </style>
</head>
<body>

    <div class="dashboard">
        <div class="top-nav">
            <button onclick="history.back()" class="nav-btn">&laquo; Powrót</button>
            <a href="index.html" class="nav-btn" title="Menu Główne">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg> Strona Główna
            </a>
        </div>

        <header class="header">
            <div class="logo-container">
                <img src="logo.png" alt="Logo Stowarzyszenia">
            </div>
            <h1>Baza Szablonów</h1>
        </header>
<nav class="nav-menu">
    <p class="section-desc">Wybierz szablon wiadomości, którego chcesz użyć:</p>
    <a href="komunikat.html" class="menu-button">Szablon Komunikat</a>
    <a href="wyniki_uchwaly.html" class="menu-button">Szablon Wyników Uchwały</a>
</nav>
    </div>

</body>
</html>
